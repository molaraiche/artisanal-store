<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card | Artisanal Store</title>
    <!-- My STYLE -->
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;1,500&display=swap"
      rel="stylesheet"
    />
    <!-- Font awsome -->
    <script
      src="https://kit.fontawesome.com/551a4a84f2.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="paiment-box">
      <div class="container">
        <a href="./index.html" class="back-paie"
          ><i class="fas fa-arrow-left"></i><i class="fas fa-back"></i
        ></a>
        <div class="paiment-card">
          <div class="type-of-pay">
            <div class="visa">
              <a href="#" class="vs"><i class="fab fa-cc-visa"></i></a>
            </div>
            <div class="masterCard">
              <a href="#" class="mc"><i class="fab fa-cc-mastercard"></i></a>
            </div>
            <div class="Paypal">
              <a href="#" class="pp"><i class="fab fa-paypal"></i></a>
            </div>

            <div class="BTC">
              <a href="#" class="btc"><i class="fab fa-btc"></i></a>
            </div>
          </div>
          <input
            type="number"
            class="cardNum"
            placeholder="4444-4444-4444"
          /><input type="number" placeholder="123" id="" />
          <a href="./paiment-Done.html" class="checkoutProcess">Paie</a>
        </div>
      </div>
    </div>
  </body>
</html>
